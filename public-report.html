<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Občianske hlásenie — Urban Canopy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles1.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="public-page">
    <h1>Občianske hlásenie</h1>
    <p style="color:var(--text-dim);max-width:42rem">UC-10: nahlásenie problému so stromom s polohou a fotografiou. Údaje sa uložia do rovnakého úložiska ako hlavná aplikácia (localStorage).</p>
    <form id="citizen-form" class="login-card" style="margin-top:1.5rem;max-width:100%">
      <div class="field-row">
        <label for="desc">Popis problému *</label>
        <textarea id="desc" name="desc" required rows="4" placeholder="Čo sa deje so stromom…"></textarea>
      </div>
      <div class="field-row field-row--inline">
        <div>
          <label for="lat">Zem. šírka (GPS) *</label>
          <input id="lat" name="lat" type="number" step="0.000001" required placeholder="48.144" />
        </div>
        <div>
          <label for="lng">Zem. dĺžka *</label>
          <input id="lng" name="lng" type="number" step="0.000001" required placeholder="17.108" />
        </div>
      </div>
      <div class="field-row">
        <label for="photo">Fotografia (voliteľné)</label>
        <input id="photo" name="photo" type="file" accept="image/*" />
      </div>
      <button type="submit" class="btn btn--accent btn--full">Odoslať hlásenie</button>
      <p id="msg" style="margin-top:1rem;color:var(--accent)" hidden></p>
    </form>
    <p style="margin-top:2rem"><a href="index.html" style="color:var(--accent)">Späť na prihlásenie (dispečer)</a></p>
  </div>
  <script>
    (function () {
      var STORAGE_KEY = 'urban-canopy-proto-v1';
      function uid() { return 'CR-' + Math.random().toString(36).slice(2, 10); }
      function nowIso() { return new Date().toISOString(); }

      document.getElementById('citizen-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var desc = document.getElementById('desc').value.trim();
        var lat = parseFloat(document.getElementById('lat').value);
        var lng = parseFloat(document.getElementById('lng').value);
        if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
          alert('Neplatné súradnice.');
          return;
        }
        var raw = localStorage.getItem(STORAGE_KEY);
        var state;
        try {
          state = raw ? JSON.parse(raw) : {};
        } catch (err) {
          state = {};
        }
        if (!state.citizenReports) state.citizenReports = [];
        if (!state.eventLog) state.eventLog = [];
        var photoName = '';
        var fileInput = document.getElementById('photo');
        if (fileInput.files && fileInput.files[0]) photoName = fileInput.files[0].name;

        var rep = {
          id: uid(),
          description: desc,
          lat: lat,
          lng: lng,
          photoName: photoName,
          status: 'NEW',
          createdAt: nowIso()
        };
        state.citizenReports.push(rep);
        state.eventLog.unshift({ t: nowIso(), type: 'CITIZEN_REPORT', detail: rep.id });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        var msg = document.getElementById('msg');
        msg.hidden = false;
        msg.textContent = 'Ďakujeme. Ticket ' + rep.id + ' má stav Nový. Dispečer uvidí hlásenie v denníku po otvorení aplikácie.';
        e.target.reset();
      });
    })();
  </script>
</body>
</html>
